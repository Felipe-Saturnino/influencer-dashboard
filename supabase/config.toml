# Configuração do Supabase (projeto local)
# Para deploy via CLI: supabase functions deploy criar-usuario
# Para deploy: supabase functions deploy atualizar-perfil

[functions.criar-usuario]
verify_jwt = false
# Evita 401 do gateway quando o browser envia o JWT — a função usa service_role internamente

[functions.atualizar-perfil]
verify_jwt = false
# Verificação de admin é feita manualmente dentro da função

[functions.criar-usuario-scout]
verify_jwt = false
# Cria influencer a partir do Scout; usa service_role internamente

[functions.sync-metricas-cda]
verify_jwt = false
# Integração CDA (Casa de Apostas): sync de métricas. Chamada pelo app e workflow diário.

[functions.trigger-social-kpis]
verify_jwt = false
# Dispara o workflow GitHub Actions Sync Social Media KPIs

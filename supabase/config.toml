# Configuração do Supabase (projeto local)
# Deploy exemplos: supabase functions deploy criar-usuario
#                   supabase functions deploy atualizar-perfil
#                   supabase functions deploy sync-rh-prestador-auth-user

[functions.criar-usuario]
verify_jwt = false
# Evita 401 do gateway quando o browser envia o JWT — a função usa service_role internamente

[functions.atualizar-perfil]
verify_jwt = false
# Verificação de admin é feita manualmente dentro da função

[functions.admin-usuario-acao]
verify_jwt = false
# Desativar/ativar usuário e reset de senha (service_role); admin verificado na função

[functions.criar-usuario-scout]
verify_jwt = false
# Cria influencer a partir do Scout; usa service_role internamente

[functions.sync-rh-prestador-auth-user]
verify_jwt = false
# Sincroniza usuário prestador (Auth + profile + user_scopes) a partir de rh_funcionarios; permissão rh_funcionarios no corpo

[functions.sync-metricas-cda]
verify_jwt = false
# Integração CDA (Casa de Apostas): sync de métricas. Chamada pelo app e workflow diário.

[functions.trigger-social-kpis]
verify_jwt = false
# Dispara o workflow GitHub Actions Sync Social Media KPIs

[functions.relatorio-diario-diretoria]
verify_jwt = false
# Chamada pelo app (Status Técnico), GitHub Actions e cron; mesma superfície que sync (anon + service na função)

[functions.email-agenda-diaria]
verify_jwt = false
# Agenda do dia (operacional); destinatários em EMAIL_AGENDA_DESTINATARIOS

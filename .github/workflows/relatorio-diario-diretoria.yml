# Relatório Diário Diretoria — Execução diária às 6h (horário de Brasília)
#
# Horário: 6h America/Sao_Paulo = 9h UTC (Brasil sem horário de verão desde 2019).
# Disparo mais cedo compensa atrasos frequentes da fila do GitHub Actions: mesmo com
# atraso de algumas horas, o e-mail tende a sair ainda pela manhã.
#
# Limitação do GitHub Actions: execuções agendadas podem atrasar alguns minutos
# (ou mais em picos de carga). Para disparo mais pontual, use o agendador nativo
# do Supabase (Edge Functions → Schedules) ou um serviço externo (ex.: cron com TZ America/Sao_Paulo).
#
# O workflow precisa existir na branch padrão do repositório para o schedule rodar.

name: Relatório Diário Diretoria (6h BRT)

permissions:
  contents: read

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: relatorio-diario-diretoria-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Horário da execução (UTC e Brasília)
        run: |
          echo "UTC:     $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Brasília: $(TZ=America/Sao_Paulo date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Enviar relatório diário
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets SUPABASE_URL e SUPABASE_ANON_KEY devem estar configurados"
            exit 1
          fi
          RES=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/relatorio-diario-diretoria" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "{}")
          HTTP=$(echo "$RES" | tail -n1)
          BODY=$(echo "$RES" | sed '$d')
          echo "HTTP $HTTP"
          echo "$BODY"
          if [ "$HTTP" != "200" ]; then
            exit 1
          fi

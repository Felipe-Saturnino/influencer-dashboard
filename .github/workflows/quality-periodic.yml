# Mesma bateria do CI, em horário agendado ou manual — útil quando há poucos pushes.
# Ajuste o cron (UTC) conforme o fuso da equipe. Não usa segredos do Supabase.

name: Quality periodic

on:
  schedule:
    # Domingo 06:00 UTC (~03h BRT)
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: quality-periodic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-key"

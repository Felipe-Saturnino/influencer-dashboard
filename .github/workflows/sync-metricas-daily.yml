# Sync de métricas CDA - Execução diária às 4h (horário de Brasília)
# 4h BRT = 7h UTC
name: Sync Métricas CDA (4h)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Executar sync-metricas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets SUPABASE_URL e SUPABASE_ANON_KEY devem estar configurados em Settings > Secrets"
            exit 1
          fi
          ONTEM=$(date -u -d "yesterday" +%Y-%m-%d)
          BODY="{\"data_inicio\":\"2025-12-01\",\"data_fim\":\"$ONTEM\",\"skip_orfaos\":false}"
          RES=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/sync-metricas" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          HTTP=$(echo "$RES" | tail -n1)
          BODY_RES=$(echo "$RES" | head -n-1)
          echo "HTTP $HTTP"
          echo "$BODY_RES" | head -c 500
          if [ "$HTTP" != "200" ]; then
            exit 1
          fi
          OK=$(echo "$BODY_RES" | grep -o '"ok":[^,]*' | cut -d: -f2)
          if [ "$OK" = "false" ]; then
            echo "Sync retornou ok:false"
            exit 1
          fi

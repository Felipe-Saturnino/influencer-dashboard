# Atualizações automáticas de dependências (PRs semanais).
# Revise cada PR: rodar `npm ci`, `npm run lint`, `npm test`, `npm run build` antes de merge.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "javascript"
    # @eslint/js 10+ exige eslint ^10 no peer; agrupar evita PR só com @eslint/js deixando eslint em 9.x.
    groups:
      eslint-ecosystem:
        patterns:
          - "eslint"
          - "@eslint/js"
          - "@eslint/*"
          - "eslint-*"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite-ecosystem:
        patterns:
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
